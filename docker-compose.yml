services:
  kaijibot-gateway:
    image: ${KAIJIBOT_IMAGE:-kaijibot:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      KAIJIBOT_GATEWAY_TOKEN: ${KAIJIBOT_GATEWAY_TOKEN:-}
      KAIJIBOT_ALLOW_INSECURE_PRIVATE_WS: ${KAIJIBOT_ALLOW_INSECURE_PRIVATE_WS:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      TZ: ${KAIJIBOT_TZ:-Asia/Shanghai}
    volumes:
      - ${KAIJIBOT_CONFIG_DIR}:/home/node/.kaijibot
      - ${KAIJIBOT_WORKSPACE_DIR}:/home/node/.kaijibot/workspace
    ports:
      - "${KAIJIBOT_GATEWAY_PORT:-18789}:18789"
      - "${KAIJIBOT_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${KAIJIBOT_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
